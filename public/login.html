<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Appointment System</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 { color: #2c7be5; margin-bottom: 5px; }
    h2 { color: #444; margin-bottom: 25px; }
    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus { border-color: #2c7be5; outline: none; }
    button {
      width: 100%;
      padding: 12px;
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #1a68d1; }
    .error-msg {
      color: red;
      font-size: 13px;
      margin-bottom: 10px;
      min-height: 18px;
    }
    a { color: #2c7be5; }
  </style>
</head>
<body>
    <div class="container">
    <h1>🏥 MediCare Hospital</h1>
    <h2>Patient Login</h2>

    <form id="loginForm">

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          placeholder="Enter your email" 
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password"
          name="password" 
          placeholder="Enter your password" 
        />
      </div>

      <div id="errorMessage" class="error-msg"></div>

      <button type="submit" id="loginBtn">Login</button>

    </form>

    <p>Don't have an account? 
      <a href="register.html" id="registerLink">Register here</a>
    </p>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');

      // Clear previous error
      errorMsg.textContent = '';

      // Validation
      if (!email || !password) {
        errorMsg.textContent = 'Please fill in all fields.';
        return;
      }

      // Hardcoded test credentials
      if (email === 'patient@medicare.com' && password === 'Test@1234') {
        window.location.href = 'dashboard.html';
      } else {
        errorMsg.textContent = 'Invalid email or password.';
      }
    });
  </script>
</body>
</html>
